name: Integration

# THE single owner of CHR integration-test execution (issue #29). Every workflow
# that needs "boot real CHRs and run test/integration/" goes through this file —
# there are no parallel copies of the runner logic anywhere else.
#
# Two faces:
#   workflow_call     — wrappers (main.yml push, sweep.yml, release checks) reuse it.
#   workflow_dispatch — the manual/lab face. Agents: this is how you ground a
#                       hypothesis on a platform you don't have locally, e.g.
#
#     gh workflow run integration.yml --ref <branch> \
#       -f platforms=macos-arm64 -f test-filter=exec.test.ts \
#       -f routeros-targets=7.24beta2 -f run-examples=false
#
# The run is a full PLATFORMS × TARGETS matrix: one dispatch can cover, say,
# gating platforms × "stable,long-term,7.24rc1" — no wrapper jobs or repeat
# dispatches needed. The default run includes the examples smoke harness and
# PowerShell lint (run-examples defaults ON — examples are part of the flow,
# not an optional extra); narrow/lab dispatches turn it off explicitly.
#
# Platform ids (comma-separate to combine, or use a group alias):
#   linux-x86    ubuntu-latest      x86 CHR    KVM       full suite by default
#   linux-arm64  ubuntu-24.04-arm   arm64 CHR  KVM       full suite by default
#   macos-arm64  macos-15           arm64 CHR  HVF       full suite by default
#   macos-x86    macos-15-intel     x86 CHR    TCG       smoke subset by default*
#   windows-x86  windows-latest     x86 CHR    TCG       smoke subset by default*
#   gating  = linux-x86,linux-arm64,macos-arm64      all = every platform
#
# * TCG platforms default to the curated smoke subset (anchor.test.ts) because the
#   full suite starves hosted runners without hardware acceleration (observed:
#   macos-x86 "runner lost communication" ~64 min). An explicit test-filter
#   overrides the subset. There is NO continue-on-error anywhere in this file:
#   green means the selected tests passed, red means they didn't (see
#   ci.instructions.md "green should be green").
#
# Per-file timing is always captured (integration-timing.txt in the artifact) —
# boot/test duration by platform × accel × RouterOS version is the raw feed for
# the ci-data metrics scheme (#30).
#
# IMPORTANT: every step that pipes `bun test … | tee` MUST run under
# `set -eo pipefail` — without it tee's exit code masks bun's failure and the
# step reports green (this bit us: arm64 run green with every test failing).

on:
  workflow_dispatch:
    inputs:
      platforms:
        type: string
        description: "Comma-separated platform ids (linux-x86, linux-arm64, macos-arm64, macos-x86, windows-x86) or an alias: 'gating' (linux-x86,linux-arm64,macos-arm64) / 'all'"
        default: "linux-x86"
      run-integration:
        type: boolean
        description: "Run the integration test suite on the selected platforms"
        default: true
      run-examples:
        type: boolean
        description: "Run the examples smoke harness (+ PowerShell lint) on each matrix leg. Default ON — turn off for narrow/lab dispatches."
        default: true
      test-filter:
        type: string
        description: "Integration: comma-separated test file names (e.g. 'exec.test.ts,anchor.test.ts'). Empty = all files (TCG platforms: smoke subset)."
        default: ""
      example-filter:
        type: string
        description: "Examples: comma-separated example names for the smoke harness (e.g. 'quickstart,rollback'). Empty = the curated subset."
        default: ""
      routeros-targets:
        type: string
        description: "Comma-separated RouterOS targets — channels (stable/long-term/testing/development) and/or pinned versions (7.22.1, 7.24beta2). Each combines with each platform. Empty = stable."
        default: ""
      collect-metrics:
        type: boolean
        description: "Append this run's boot/test timing to the ci-data branch (runs/*.ndjson + tested-versions.json)"
        default: false
  workflow_call:
    inputs:
      platforms:
        type: string
        default: "linux-x86"
      run-integration:
        type: boolean
        default: true
      run-examples:
        type: boolean
        default: true
      test-filter:
        type: string
        default: ""
      example-filter:
        type: string
        default: ""
      routeros-targets:
        type: string
        default: ""
      collect-metrics:
        type: boolean
        description: "Append boot/test timing to the ci-data branch (caller must grant contents: write)"
        default: false
      artifact-prefix:
        type: string
        description: "Prefix for uploaded artifact names so parallel callers don't collide"
        default: "integration"

# Least-privilege: this workflow only runs tests and uploads artifacts.
permissions:
  contents: read

jobs:
  # ── plan: resolve platforms × targets into one job matrix ────────────────────
  # One place defines the platform table (runner, CHR arch, accel, smoke default)
  # and crosses it with the RouterOS targets list. Unknown platform ids or
  # malformed targets FAIL the plan — a typo must never produce a silently empty
  # (falsely green) run.
  plan:
    name: Plan matrix (platforms × targets)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        env:
          PLATFORMS: ${{ inputs.platforms }}
          TARGETS: ${{ inputs.routeros-targets }}
        run: |
          set -eo pipefail
          # id → label | runner | tcg (no hw accel on hosted runner) | smoke-default
          table() {
            case "$1" in
              linux-x86)   echo 'linux/x86_64|ubuntu-latest|false|false' ;;
              linux-arm64) echo 'linux/aarch64|ubuntu-24.04-arm|false|false' ;;
              macos-arm64) echo 'macos/arm64|macos-15|false|false' ;;
              macos-x86)   echo 'macos/x86_64|macos-15-intel|true|true' ;;
              windows-x86) echo 'windows/x86_64|windows-latest|true|true' ;;
              *) return 1 ;;
            esac
          }
          LIST="${PLATFORMS// /}"
          case "$LIST" in
            gating) LIST="linux-x86,linux-arm64,macos-arm64" ;;
            all)    LIST="linux-x86,linux-arm64,macos-arm64,macos-x86,windows-x86" ;;
          esac
          TARGET_LIST="${TARGETS// /}"
          [ -z "$TARGET_LIST" ] && TARGET_LIST="stable"
          # Validate each target: a channel name or a RouterOS version string.
          IFS=',' read -ra TARGET_ARR <<< "$TARGET_LIST"
          for t in "${TARGET_ARR[@]}"; do
            [ -z "$t" ] && continue
            if ! printf '%s' "$t" | grep -qE '^(stable|long-term|testing|development|[0-9]+\.[0-9]+(\.[0-9]+)?((beta|rc)[0-9]+)?)$'; then
              echo "::error::Invalid routeros-target '$t' (channel or version like 7.22.1 / 7.24beta2)"
              exit 1
            fi
          done
          inc='[]'
          IFS=',' read -ra IDS <<< "$LIST"
          for id in "${IDS[@]}"; do
            [ -z "$id" ] && continue
            if ! row=$(table "$id"); then
              echo "::error::Unknown platform id '$id' (valid: linux-x86, linux-arm64, macos-arm64, macos-x86, windows-x86, gating, all)"
              exit 1
            fi
            IFS='|' read -r label runner tcg smoke <<< "$row"
            for t in "${TARGET_ARR[@]}"; do
              [ -z "$t" ] && continue
              inc=$(printf '%s' "$inc" | jq -c \
                --arg id "$id" --arg label "$label" --arg os "$runner" \
                --arg target "$t" \
                --argjson tcg "$tcg" --argjson smoke "$smoke" \
                '. + [{id:$id, label:$label, os:$os, tcg:$tcg, smoke:$smoke, target:$target}]')
            done
          done
          if [ "$inc" = "[]" ]; then
            echo "::error::platforms × targets resolved to an empty matrix — nothing would run"
            exit 1
          fi
          echo "matrix={\"include\":$inc}" >> "$GITHUB_OUTPUT"
          echo "Resolved matrix: $inc"

  # ── integration suite (platform matrix) ──────────────────────────────────────
  integration:
    name: Integration (${{ matrix.label }} · ${{ matrix.target }})
    needs: plan
    if: ${{ inputs.run-integration }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.tcg && 90 || 60 }}
    defaults:
      run:
        shell: bash
    env:
      QUICKCHR_TEST_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0

      # ipxe-qemu provides efi-virtio.rom (needed by virtio-net-pci); harmless on
      # x86, mandatory on arm64. qemu-efi-aarch64 = UEFI firmware for virt machine.
      - name: Install QEMU + tools (Linux x86)
        if: ${{ matrix.id == 'linux-x86' }}
        run: |
          set -eo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-x86 qemu-utils ipxe-qemu sshpass

      - name: Install QEMU + tools (Linux arm64)
        if: ${{ matrix.id == 'linux-arm64' }}
        run: |
          set -eo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-arm qemu-utils qemu-efi-aarch64 ipxe-qemu sshpass

      - name: Install QEMU + tools (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: brew install qemu sshpass

      # No HVF/WHPX on GitHub Windows runners → QEMU falls back to TCG.
      - name: Install QEMU (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          choco install qemu -y --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\qemu"

      - name: Enable KVM
        if: ${{ runner.os == 'Linux' }}
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          if [ -w /dev/kvm ] 2>/dev/null; then
            echo "KVM is available — hardware acceleration active"
          else
            echo "::notice::KVM not available — integration tests will use TCG (slower)"
          fi

      - name: Log platform
        run: |
          {
            echo "### Platform: ${{ matrix.label }} — target ${{ matrix.target }}"
            echo "- OS: $(uname -s 2>/dev/null || echo Windows) $(uname -m 2>/dev/null || echo x86_64)"
            echo "- Bun: $(bun --version)"
            qemu-system-x86_64 --version 2>/dev/null | head -1 | sed 's/^/- QEMU: /' || true
            qemu-system-aarch64 --version 2>/dev/null | head -1 | sed 's/^/- QEMU: /' || true
            echo "- RouterOS target: \`${QUICKCHR_TEST_TARGET:-stable (default)}\`"
            if [ "${{ runner.os }}" = "Linux" ]; then
              if [ -w /dev/kvm ] 2>/dev/null; then echo "- Accel: KVM"; else echo "- Accel: TCG (no /dev/kvm)"; fi
            elif [ "${{ matrix.tcg }}" = "true" ]; then
              echo "- Accel: TCG (no hardware acceleration on this hosted runner)"
            else
              echo "- Accel: HVF (expected)"
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Cache CHR images (POSIX)
        if: ${{ runner.os != 'Windows' }}
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - name: Cache CHR images (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # test-filter arrives via env (never inlined ${{ }} in the script) to avoid
      # workflow template injection. An empty resolution FAILS — a filter typo or
      # empty smoke subset must never produce a zero-iteration (falsely green) run.
      - name: Resolve test files
        id: files
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
          SMOKE_DEFAULT: ${{ matrix.smoke }}
        run: |
          set -eo pipefail
          FILTER="${TEST_FILTER// /}"
          if [ -z "$FILTER" ] && [ "$SMOKE_DEFAULT" = "true" ]; then
            # TCG platforms: full suite starves the runner — default to the curated
            # smoke subset that exercises boot + REST end-to-end and completes.
            FILTER="anchor.test.ts"
            echo "::notice::TCG platform smoke default: $FILTER (override via the test-filter input)"
          fi
          if [ -z "$FILTER" ]; then
            ALL=""
            for f in test/integration/*.test.ts; do ALL="$ALL $f"; done
            echo "list=$ALL" >> "$GITHUB_OUTPUT"
            # scope=full is what lets a run mark a RouterOS version "tested" in
            # ci-data/tested-versions.json — filtered/smoke runs never do.
            echo "scope=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "scope=filtered" >> "$GITHUB_OUTPUT"
          FILES=""
          IFS=',' read -ra PARTS <<< "$FILTER"
          for f in "${PARTS[@]}"; do
            [ -z "$f" ] && continue
            if [ -f "test/integration/$f" ]; then
              FILES="$FILES test/integration/$f"
            else
              echo "::warning::Skipping unknown test file: $f"
            fi
          done
          if [ -z "${FILES// /}" ]; then
            echo "::error::test-filter '$FILTER' matched no known files in test/integration/"
            exit 1
          fi
          echo "list=$FILES" >> "$GITHUB_OUTPUT"

      # Sequential per-file to avoid 4-way parallel CHR boot contention on 4-CPU
      # runners (boot timeouts under concurrent load — see testing.instructions.md
      # "Integration Test Parallelism"). Output + timing live under $HOME on every
      # platform: on Windows the workspace is on D:\ while quickchr state is on
      # C:\, and upload-artifact needs a common ancestor across all paths.
      - name: Run integration tests (sequential per-file)
        id: run
        env:
          FILE_LIST: ${{ steps.files.outputs.list }}
        run: |
          set -eo pipefail
          echo "::group::Integration test output"
          : > "$HOME/integration-output.txt"
          : > "$HOME/integration-timing.txt"
          fail=0
          for f in $FILE_LIST; do
            echo "::notice::Running $f"
            t0=$(date +%s)
            status=pass
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a "$HOME/integration-output.txt"; then
              fail=1
              status=fail
            fi
            t1=$(date +%s)
            echo "$(basename "$f") $((t1 - t0))s $status" >> "$HOME/integration-timing.txt"
          done
          echo "::endgroup::"
          exit "$fail"

      # TCG QEMU orphans keep burning 100% CPU after a timeout/cancel, starving the
      # runner until it loses communication and later steps never run. Reap them
      # unconditionally; harmless when nothing is left.
      - name: Kill leftover QEMU processes
        if: always()
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            taskkill //IM qemu-system-x86_64.exe //F 2>/dev/null || true
          else
            pkill -TERM -f 'qemu-system-(x86_64|aarch64)' 2>/dev/null || true
            sleep 3
            pkill -KILL -f 'qemu-system-(x86_64|aarch64)' 2>/dev/null || true
          fi
          true

      # Diagnostic regression guard, arm64 only (historical stale-REST bug). Its
      # failure is the signal being collected, so it never gates — the explicit
      # PASS/FAIL notice below is the honest reporting path, not a hidden skip.
      - name: Run arm64 REST ordering repro
        if: ${{ always() && matrix.id == 'linux-arm64' }}
        run: |
          set -eo pipefail
          echo "::group::arm64 REST ordering repro (test/lab/arm64-rest-ordering/repro.test.ts)"
          rc=0
          QUICKCHR_INTEGRATION=1 bun test test/lab/arm64-rest-ordering/repro.test.ts \
            2>&1 | tee "$HOME/arm64-rest-repro.txt" || rc=$?
          echo "::endgroup::"
          echo "repro exit code: $rc" | tee -a "$HOME/arm64-rest-repro.txt"
          if [ "$rc" -eq 0 ]; then
            echo "::notice::arm64 REST repro PASSED — GET→POST ordering is correct (no stale-response)"
          else
            echo "::warning::arm64 REST repro FAILED (rc=$rc) — see scenario output for which layer is at fault"
          fi
        timeout-minutes: 15

      # Metrics as a byproduct (#30): boots from the library's boot-history log
      # + the per-file timing file → one metrics.ndjson (uploaded always; the
      # aggregate job pushes it to the ci-data branch when collect-metrics is on).
      - name: Assemble metrics
        if: always()
        env:
          PLATFORM_ID: ${{ matrix.id }}
          SCOPE: ${{ steps.files.outputs.scope }}
          SUITE_CONCLUSION: ${{ steps.run.outcome == 'success' && 'pass' || 'fail' }}
        run: bun scripts/ci-metrics.ts assemble --timing "$HOME/integration-timing.txt" --out "$HOME/metrics.ndjson"

      # Agent-friendly summary: failing lines only (not a log dump), then the
      # per-file timing table. The full output is in the artifact.
      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration — ${{ matrix.label }} · ${{ matrix.target }}"
            if [ ! -s "$HOME/integration-output.txt" ]; then
              echo "❌ no test output captured — the run step likely failed before bun test"
            elif grep -qE '\(fail\)' "$HOME/integration-output.txt"; then
              echo "### ❌ Failing tests"
              echo '```'
              grep -E '\(fail\)' "$HOME/integration-output.txt" | head -40
              echo '```'
              echo ""
              echo "### Last errors"
              echo '```'
              grep -B1 -A4 -E '^error:|error\(' "$HOME/integration-output.txt" | tail -60 || true
              echo '```'
            else
              echo "✅ all selected integration tests passed"
            fi
            echo ""
            echo "### Per-file timing"
            echo '```'
            cat "$HOME/integration-timing.txt" 2>/dev/null || echo "(no timing captured)"
            echo '```'
            if [ -s "$HOME/arm64-rest-repro.txt" ]; then
              echo ""
              echo "### arm64 REST ordering repro (diagnostic, non-gating)"
              echo '```'
              tail -5 "$HOME/arm64-rest-repro.txt"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs (POSIX)
        if: ${{ always() && runner.os != 'Windows' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact-prefix || 'integration' }}-logs-${{ matrix.id }}-${{ matrix.target }}
          if-no-files-found: warn
          path: |
            ~/integration-output.txt
            ~/integration-timing.txt
            ~/metrics.ndjson
            ~/arm64-rest-repro.txt
            ~/.local/share/quickchr/boot-log.ndjson
            ~/.local/share/quickchr/machines/**/*.json
            ~/.local/share/quickchr/machines/**/*.log
          retention-days: 7

      - name: Upload integration logs (Windows)
        if: ${{ always() && runner.os == 'Windows' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact-prefix || 'integration' }}-logs-${{ matrix.id }}-${{ matrix.target }}
          if-no-files-found: warn
          path: |
            ~/integration-output.txt
            ~/integration-timing.txt
            ~/metrics.ndjson
            ~/AppData/Local/quickchr/boot-log.ndjson
            ~/AppData/Local/quickchr/machines/**/*.json
            ~/AppData/Local/quickchr/machines/**/*.log
          retention-days: 7

  # ── aggregate: push metrics to the ci-data branch ────────────────────────────
  # Runs when collect-metrics is on, even when integration legs failed — a red
  # run's timing/conclusion is exactly what tested-versions.json must record so
  # the ros-versions scheduler can re-flag the version. Callers via workflow_call
  # must grant `contents: write` (reusable-workflow perms are capped by the
  # calling job). Per-run filenames avoid push conflicts; the rebase-retry loop
  # covers the shared tested-versions.json rollup.
  #
  # BEST-EFFORT BY CONTRACT: metrics are side-band. This job goes green with a
  # loud ::warning:: + summary note when folding/pushing fails, because a red
  # here would red main.yml and the PR freshness gate would then block every PR
  # over a metrics hiccup. That is the one deliberate exception to "red is red" —
  # the warning IS the honest signal, and the raw metrics stay in the artifacts.
  aggregate:
    name: Aggregate metrics → ci-data
    needs: [plan, integration]
    if: ${{ !cancelled() && inputs.collect-metrics && inputs.run-integration }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/checkout@v5
        with:
          ref: ci-data
          path: ci-data
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
      - run: bun install --frozen-lockfile

      - name: Download metrics artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: ${{ inputs.artifact-prefix || 'integration' }}-logs-*
          path: artifacts

      - name: Fold into ci-data
        id: fold
        run: |
          if ! bun scripts/ci-metrics.ts aggregate --data ci-data --artifacts artifacts; then
            echo "::warning title=ci-data::metrics fold failed — this run's timing is only in the artifacts (see job log)"
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push (rebase-retry, best-effort)
        if: ${{ steps.fold.outputs.failed != 'true' }}
        run: |
          set -o pipefail
          cd ci-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runs tested-versions.json
          if git diff --cached --quiet; then
            echo "no metrics changes to record"
            exit 0
          fi
          git commit -m "metrics: run ${{ github.run_id }} (${{ github.event_name }})"
          for attempt in 1 2 3; do
            if git push origin ci-data; then
              exit 0
            fi
            echo "push attempt $attempt failed — rebasing onto remote ci-data"
            git pull --rebase origin ci-data || true
          done
          if ! git push origin ci-data; then
            echo "::warning title=ci-data::could not push metrics after 4 attempts — this run's timing is only in the artifacts"
          fi
          exit 0

      - name: Write aggregate summary
        if: always()
        run: |
          {
            echo "## ci-data"
            echo '```'
            cat ci-data/tested-versions.json 2>/dev/null || echo "(no tested-versions.json)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── examples smoke (platform matrix) ─────────────────────────────────────────
  # Runs the runnable examples end-to-end (one representative per language for the
  # current OS + the intentional failure-path case) to catch CLI/env/exit-code/
  # cleanup drift the cheap gate (tsc/biome/shellcheck/validate-examples) can't.
  # trial-license is excluded (MikroTik rate limits). No continue-on-error: a
  # broken example is red on every platform it was asked to run on.
  examples-smoke:
    name: Examples smoke (${{ matrix.label }} · ${{ matrix.target }})
    needs: plan
    if: ${{ inputs.run-examples }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    env:
      QUICKCHR_TEST_TARGET: ${{ matrix.target }}
      EXAMPLE_FILTER: ${{ inputs.example-filter }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0

      - name: Install QEMU + tools (Linux x86)
        if: ${{ matrix.id == 'linux-x86' }}
        run: |
          set -eo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-x86 qemu-utils ipxe-qemu sshpass

      - name: Install QEMU + tools (Linux arm64)
        if: ${{ matrix.id == 'linux-arm64' }}
        run: |
          set -eo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-arm qemu-utils qemu-efi-aarch64 ipxe-qemu sshpass

      - name: Install QEMU + tools (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: brew install qemu sshpass

      - name: Install QEMU (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          choco install qemu -y --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\qemu"

      # uv runs the Python example representative (mndp.py) the documented way.
      - name: Install uv (Linux/macOS)
        if: ${{ runner.os != 'Windows' }}
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        if: ${{ runner.os == 'Linux' }}
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      - name: Cache CHR images (POSIX)
        if: ${{ runner.os != 'Windows' }}
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - name: Cache CHR images (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Log platform
        run: |
          {
            echo "### Examples smoke: ${{ matrix.label }} — target ${{ matrix.target }}"
            echo "- OS: $(uname -s 2>/dev/null || echo Windows) / ${{ runner.arch }}"
            echo "- Bun: $(bun --version)"
            echo "- RouterOS target: \`${QUICKCHR_TEST_TARGET:-stable (default)}\`"
            echo "- Example filter: \`${EXAMPLE_FILTER:-curated subset}\`"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # The harness (test/integration/examples-smoke.test.ts) picks the right
      # representatives for the current OS (.ts everywhere; .sh/.py on POSIX; .ps1
      # on Windows). `bun run` evaluates the VAR=val script prefix cross-platform.
      - name: Run examples smoke harness
        run: |
          set -eo pipefail
          bun run smoke:examples 2>&1 | tee "$HOME/smoke-output.txt"

      - name: Kill leftover QEMU processes
        if: always()
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            taskkill //IM qemu-system-x86_64.exe //F 2>/dev/null || true
          else
            pkill -TERM -f 'qemu-system-(x86_64|aarch64)' 2>/dev/null || true
            sleep 3
            pkill -KILL -f 'qemu-system-(x86_64|aarch64)' 2>/dev/null || true
          fi
          true

      - name: Write smoke summary
        if: always()
        run: |
          {
            echo "## Examples smoke — ${{ matrix.label }} · ${{ matrix.target }}"
            if [ ! -s "$HOME/smoke-output.txt" ]; then
              echo "❌ no output captured — the harness likely failed before running"
            elif grep -qE '\(fail\)' "$HOME/smoke-output.txt"; then
              echo "### ❌ Failing examples"
              echo '```'
              grep -E '\(fail\)' "$HOME/smoke-output.txt" | head -40
              echo '```'
            else
              echo "✅ examples smoke passed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── PowerShell lint ──────────────────────────────────────────────────────────
  # Static-analyze the example .ps1 mirrors whenever examples run. Reuses the
  # dedicated workflow (which also runs on its own for .ps1 pushes/PRs — #28).
  lint-powershell:
    name: Lint PowerShell examples
    if: ${{ inputs.run-examples }}
    uses: ./.github/workflows/lint-powershell.yml
