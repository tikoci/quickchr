name: CI

# Runs on every push/PR to main.  Core pipeline only — arm64, macOS, and Windows
# integration tests live in verify-extended.yml (manual workflow_dispatch).
#
# Pipeline:
#
#   lint ────┐
#   unit-tests (Linux) ─┴→ integration-x86 → windows-unit-tests
#
# Why staged: if x86 unit OR x86 integration fails, the bug is almost certainly
# platform-agnostic and Windows runner minutes add no signal.
#
# Extended verification (arm64, macOS, Windows integration):
#   → .github/workflows/verify-extended.yml  (workflow_dispatch only)
#
# Artifacts produced (retention: see each job):
#   coverage-report                 — full bun coverage table text (14 days)
#   integration-logs-linux-x64      — bun output + machine.json + qemu.log (7 days)
#
# IMPORTANT: every step that pipes `bun test … | tee` MUST run under `set -eo pipefail`.
# Without pipefail the `tee` exit code masks bun's failure and the step reports green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      min-funcs:
        type: string
        description: "Function coverage floor % — build warns but does not fail below this (default: 75)"
        default: "75"
      min-lines:
        type: string
        description: "Line coverage floor % — build warns but does not fail below this (default: 60)"
        default: "60"

# Thresholds fall back to hardcoded defaults when triggered by push/PR (no dispatch inputs).
env:
  COVERAGE_MIN_FUNCS: ${{ github.event.inputs.min-funcs || '75' }}
  COVERAGE_MIN_LINES: ${{ github.event.inputs.min-lines || '60' }}

jobs:
  # ── Repo checks ─────────────────────────────────────────────────────────────
  lint:
    name: Repo Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run repo checks
        run: bun run check

  # ── Unit tests + coverage ────────────────────────────────────────────────────
  # Runs in parallel with lint. Integration tests depend on both completing.
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      # NOTE: pipefail is mandatory — without it the `tee` exit code masks bun's
      # failure and the step reports green even when tests fail.
      - name: Run unit tests with coverage
        id: coverage
        run: |
          set -eo pipefail
          echo "::group::Test output"
          bun test test/unit/ --coverage 2>&1 | tee /tmp/coverage-report.txt
          echo "::endgroup::"

      # Always-run summary + coverage parse — runs on success AND failure so the
      # coverage table appears in the job summary even when tests fail.
      # Parses bun's coverage table "All files" row (format: File | % Funcs | % Lines | Uncovered)
      - name: Write coverage to job summary
        if: always()
        id: parse-coverage
        run: |
          set -eo pipefail
          if [ ! -s /tmp/coverage-report.txt ]; then
            echo "(no coverage report captured — bun test likely crashed before coverage)" \
              >> "$GITHUB_STEP_SUMMARY"
            echo "funcs=0" >> "$GITHUB_OUTPUT"
            echo "lines=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FUNC_PCT=$(grep "^All files" /tmp/coverage-report.txt \
            | awk -F'|' '{gsub(/ /,"",$2); print $2}' || echo 0)
          LINE_PCT=$(grep "^All files" /tmp/coverage-report.txt \
            | awk -F'|' '{gsub(/ /,"",$3); print $3}' || echo 0)
          echo "funcs=${FUNC_PCT:-0}" >> "$GITHUB_OUTPUT"
          echo "lines=${LINE_PCT:-0}" >> "$GITHUB_OUTPUT"
          {
            echo "## Unit Test Coverage"
            echo ""
            echo '```'
            awk '/^-{10}/{found=1} found{print}' /tmp/coverage-report.txt
            echo '```'
            echo ""
            echo "| Metric    | Actual | Threshold |"
            echo "|-----------|--------|-----------|"
            echo "| Functions | ${FUNC_PCT:-0}% | ${COVERAGE_MIN_FUNCS}% |"
            echo "| Lines     | ${LINE_PCT:-0}% | ${COVERAGE_MIN_LINES}% |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: /tmp/coverage-report.txt
          retention-days: 14

      # This step warns but does NOT hard-fail the build (continue-on-error: true).
      # Thresholds are enforced as annotations so agents can see the degradation
      # without blocking merges.  Override via workflow_dispatch inputs to 0 if
      # you need to land a PR while coverage is temporarily below baseline.
      - name: Enforce coverage thresholds
        if: always() && steps.coverage.outcome == 'success'
        continue-on-error: true
        run: |
          FUNC_PCT="${{ steps.parse-coverage.outputs.funcs }}"
          LINE_PCT="${{ steps.parse-coverage.outputs.lines }}"
          MIN_FUNCS="${COVERAGE_MIN_FUNCS}"
          MIN_LINES="${COVERAGE_MIN_LINES}"
          FAIL=0

          if awk "BEGIN { exit !($FUNC_PCT + 0 < $MIN_FUNCS + 0) }"; then
            echo "::warning title=Coverage::Function coverage ${FUNC_PCT}% is below threshold ${MIN_FUNCS}%"
            FAIL=1
          fi
          if awk "BEGIN { exit !($LINE_PCT + 0 < $MIN_LINES + 0) }"; then
            echo "::warning title=Coverage::Line coverage ${LINE_PCT}% is below threshold ${MIN_LINES}%"
            FAIL=1
          fi

          if [ "$FAIL" = "1" ]; then
            echo "Coverage thresholds not met — build continues, check annotations above"
            exit 1
          fi
          echo "Coverage thresholds met: functions=${FUNC_PCT}% >= ${MIN_FUNCS}%, lines=${LINE_PCT}% >= ${MIN_LINES}%"

  # ── Integration tests — x86_64 (gate for arm64/windows/macos) ───────────────
  # Single canonical integration runner. If this fails, downstream jobs do not
  # run — there's no signal in arm64/windows when the core is broken.
  integration-x86:
    name: Integration (linux/x86_64)
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      # ipxe-qemu provides efi-virtio.rom (PXE boot ROM for virtio-net-pci).
      # Without it, ARM64 virt machine fails with "failed to find romfile".
      # Harmless on x86 — keep it consistent across runners.
      - name: Install QEMU + tools
        run: |
          set -eo pipefail
          echo "::group::apt-get install"
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-x86 qemu-utils ipxe-qemu sshpass
          echo "::endgroup::"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          if [ -w /dev/kvm ] 2>/dev/null; then
            echo "KVM is available — hardware acceleration active"
          else
            echo "::notice::KVM not available — integration tests will use TCG (slower boot times expected)"
          fi

      - name: Log platform + QEMU info
        run: |
          {
            echo "### Platform: linux/x86_64"
            echo "- OS: $(uname -s) $(uname -m)"
            qemu-system-x86_64 --version 2>/dev/null | head -1 || true
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          qemu-system-x86_64 --version 2>/dev/null || true
          uname -a

      - name: Cache CHR images
        uses: actions/cache@v4
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Run integration tests (sequential per-file)
        id: inttest
        # Run files sequentially to avoid 4-way parallel CHR boot contention
        # on 4-CPU runners (boot timeouts at 120s under heavy concurrent load).
        # See .github/instructions/testing.instructions.md "Integration Test
        # Parallelism" section.
        run: |
          set -eo pipefail
          echo "::group::Integration test output"
          : > /tmp/integration-output.txt
          fail=0
          for f in test/integration/*.test.ts; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/integration-output.txt; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        timeout-minutes: 50

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — linux/x86_64"
            echo ""
            echo '```'
            tail -80 /tmp/integration-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs-linux-x64
          path: |
            /tmp/integration-output.txt
            ~/.local/share/quickchr/machines/**/*.json
            ~/.local/share/quickchr/machines/**/*.log
          retention-days: 7


  # ── Windows unit tests (depends on x86 integration success) ─────────────────
  # Runs Windows-only tests (named pipes, Job Object detach, LOCALAPPDATA paths).
  # Platform-skipped tests (skipIf(platform !== "win32")) execute only here; they
  # are skipped on Linux/macOS.  Integration tests on Windows (QEMU for Windows)
  # are tracked in BACKLOG.md as future work.
  #
  # Gated on integration-x86 so a Linux-side regression doesn't waste Windows
  # runner minutes; the Windows unit suite is only meaningful once the core is OK.
  windows-unit-tests:
    name: Unit Tests (windows-latest)
    needs: [integration-x86]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run unit tests (includes Windows-specific tests)
        run: bun test test/unit/
