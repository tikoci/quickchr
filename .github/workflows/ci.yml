name: CI

# Fast quality gate on every push/PR to main (~3-5 min, no QEMU, no CHR boots).
#
#   lint ∥ unit-tests (Linux, coverage) ∥ windows-unit-tests ∥ integration-freshness (PR only)
#
# Integration tests do NOT run here — they run on every push to main via
# main.yml (linux/x86_64 + linux/aarch64, full suite) and on the weekly sweep.
# The `integration-freshness` job keeps that honest: a PR can only merge while
# the latest completed integration run on main is green, so a red main blocks
# all PRs until fixed instead of rotting quietly in the Actions list.
#
# Need integration signal for THIS branch before merging? Dispatch the reusable
# unit directly (see ci.instructions.md "Integration"):
#
#   gh workflow run integration.yml --ref <branch> -f platforms=linux-x86 -f test-filter=<file>
#
# IMPORTANT: every step that pipes `bun test … | tee` MUST run under
# `set -eo pipefail` — without it tee's exit code masks bun's failure and the
# step reports green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      min-funcs:
        type: string
        description: "Function coverage floor % — build warns but does not fail below this (default: 75)"
        default: "75"
      min-lines:
        type: string
        description: "Line coverage floor % — build warns but does not fail below this (default: 60)"
        default: "60"

# Thresholds fall back to hardcoded defaults when triggered by push/PR (no dispatch inputs).
env:
  COVERAGE_MIN_FUNCS: ${{ github.event.inputs.min-funcs || '75' }}
  COVERAGE_MIN_LINES: ${{ github.event.inputs.min-lines || '60' }}

# Least-privilege default for all jobs; elevate per-job only where a job needs more.
permissions:
  contents: read

# Superseded pushes to the same ref carry no signal — cancel them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Repo checks ─────────────────────────────────────────────────────────────
  lint:
    name: Repo Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
      - run: bun install --frozen-lockfile
      # shellcheck makes `bun run check`'s lint:shell actually enforce POSIX-sh on
      # the example scripts (it skips silently when shellcheck is absent locally).
      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
      - name: Run repo checks
        run: bun run check

  # ── Unit tests + coverage ────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
      - run: bun install --frozen-lockfile

      # NOTE: pipefail is mandatory — without it the `tee` exit code masks bun's
      # failure and the step reports green even when tests fail.
      - name: Run unit tests with coverage
        id: coverage
        run: |
          set -eo pipefail
          echo "::group::Test output"
          bun test test/unit/ --coverage 2>&1 | tee /tmp/coverage-report.txt
          echo "::endgroup::"

      # Always-run summary + coverage parse — runs on success AND failure so the
      # coverage table appears in the job summary even when tests fail.
      # Parses bun's coverage table "All files" row (format: File | % Funcs | % Lines | Uncovered)
      - name: Write coverage to job summary
        if: always()
        id: parse-coverage
        run: |
          set -eo pipefail
          if [ ! -s /tmp/coverage-report.txt ]; then
            echo "(no coverage report captured — bun test likely crashed before coverage)" \
              >> "$GITHUB_STEP_SUMMARY"
            echo "funcs=0" >> "$GITHUB_OUTPUT"
            echo "lines=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FUNC_PCT=$(grep "^All files" /tmp/coverage-report.txt \
            | awk -F'|' '{gsub(/ /,"",$2); print $2}' || echo 0)
          LINE_PCT=$(grep "^All files" /tmp/coverage-report.txt \
            | awk -F'|' '{gsub(/ /,"",$3); print $3}' || echo 0)
          echo "funcs=${FUNC_PCT:-0}" >> "$GITHUB_OUTPUT"
          echo "lines=${LINE_PCT:-0}" >> "$GITHUB_OUTPUT"
          {
            echo "## Unit Tests"
            if grep -qE '\(fail\)' /tmp/coverage-report.txt; then
              echo "### ❌ Failing tests"
              echo '```'
              grep -E '\(fail\)' /tmp/coverage-report.txt | head -40
              echo '```'
            else
              echo "✅ all unit tests passed"
            fi
            echo ""
            echo "| Coverage  | Actual | Floor |"
            echo "|-----------|--------|-----------|"
            echo "| Functions | ${FUNC_PCT:-0}% | ${COVERAGE_MIN_FUNCS}% |"
            echo "| Lines     | ${LINE_PCT:-0}% | ${COVERAGE_MIN_LINES}% |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: /tmp/coverage-report.txt
          retention-days: 14

      # This step warns but does NOT hard-fail the build (continue-on-error: true).
      # Thresholds are enforced as annotations so agents can see the degradation
      # without blocking merges.  Override via workflow_dispatch inputs to 0 if
      # you need to land a PR while coverage is temporarily below baseline.
      - name: Enforce coverage thresholds
        if: always() && steps.coverage.outcome == 'success'
        continue-on-error: true
        run: |
          FUNC_PCT="${{ steps.parse-coverage.outputs.funcs }}"
          LINE_PCT="${{ steps.parse-coverage.outputs.lines }}"
          MIN_FUNCS="${COVERAGE_MIN_FUNCS}"
          MIN_LINES="${COVERAGE_MIN_LINES}"
          FAIL=0

          if awk "BEGIN { exit !($FUNC_PCT + 0 < $MIN_FUNCS + 0) }"; then
            echo "::warning title=Coverage::Function coverage ${FUNC_PCT}% is below threshold ${MIN_FUNCS}%"
            FAIL=1
          fi
          if awk "BEGIN { exit !($LINE_PCT + 0 < $MIN_LINES + 0) }"; then
            echo "::warning title=Coverage::Line coverage ${LINE_PCT}% is below threshold ${MIN_LINES}%"
            FAIL=1
          fi

          if [ "$FAIL" = "1" ]; then
            echo "Coverage thresholds not met — build continues, check annotations above"
            exit 1
          fi
          echo "Coverage thresholds met: functions=${FUNC_PCT}% >= ${MIN_FUNCS}%, lines=${LINE_PCT}% >= ${MIN_LINES}%"

  # ── Windows unit tests ───────────────────────────────────────────────────────
  # Runs Windows-only tests (TCP-localhost channels, Job Object detach,
  # LOCALAPPDATA paths). No longer gated behind integration — this suite is fast
  # and its signal is independent of CHR behavior.
  windows-unit-tests:
    name: Unit Tests (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
      - run: bun install --frozen-lockfile
      - name: Run unit tests (includes Windows-specific tests)
        run: bun test test/unit/

  # ── Integration freshness (PR only, required check) ─────────────────────────
  # The honesty contract for integration-on-main: PRs merge only while the
  # latest signal-bearing integration run on main is green. Verdict logic lives
  # in scripts/ci-freshness.ts (unit-tested); this job just runs it.
  integration-freshness:
    name: Integration freshness
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # list main.yml workflow runs (top-level block would strip this)
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # setup-bun action v2.2.0
      - name: Check latest main integration run
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: bun run scripts/ci-freshness.ts
