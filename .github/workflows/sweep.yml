name: Weekly Sweep

# Weekly all-platform verification: everything main.yml's per-push run does NOT
# cover — macos/arm64 (full suite, HVF), macos/x86 + windows/x86 (TCG smoke
# subset) — plus the examples smoke harness on every platform.
#
# Deliberately a SEPARATE workflow from main.yml: the PR freshness gate reads
# main.yml runs only, so a red TCG leg here never blocks PRs. A red sweep is
# still a real failure to investigate (never green-washed with
# continue-on-error) — check the Actions list Monday mornings, or dispatch:
#
#   gh workflow run sweep.yml
#
# All execution is delegated to integration.yml.

on:
  schedule:
    - cron: "37 5 * * 1" # Monday 05:37 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sweep-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  sweep:
    name: All-platform sweep
    uses: ./.github/workflows/integration.yml
    with:
      platforms: all
      run-examples: true
      artifact-prefix: sweep
