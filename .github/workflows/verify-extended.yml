name: Extended Verification

# Manual cross-platform verification not covered by the push pipeline (ci.yml, which
# gates on linux/x86_64 integration + Windows unit tests). One dispatch chooses:
#   1. WHICH platforms       — the five platform toggles below.
#   2. WHAT runs on them      — `run-integration` and/or `run-examples` (the examples
#                               smoke harness). Both default-on/off so the same
#                               dispatch can verify the test suite AND the examples.
#   3. Against WHICH RouterOS — `routeros-target` (a channel or pinned version).
#   4. On WHICH branch        — the ref selected in the "Run workflow" dropdown (a
#                               native workflow_dispatch field; the whole run, incl.
#                               the examples it executes, uses that checkout).
#
# Platform × mode is the matrix: e.g. tick macos-arm64 + windows-x86, leave
# run-integration on and turn run-examples on, to confirm both the suite and the
# runnable examples pass on those OSes.
#
# Examples are held to the same bar as the code: a broken example REDS this workflow
# on the gating platforms (linux KVM, macOS HVF). macOS/x86 (TCG) and Windows (TCG)
# stay non-gating/informational, mirroring the integration jobs.
#
# Use test-filter to narrow integration to specific files (e.g.
# "exec.test.ts,anchor.test.ts"); example-filter narrows the smoke harness
# (e.g. "quickstart,rollback"). routeros-target is exported as QUICKCHR_TEST_TARGET
# and consumed by both the integration tests (test/integration/image-target.ts) and
# the examples. (Version-pinned tests stay pinned.)
#
# arm64 status (resolved; see git history + the clean() note in src/lib/quickchr.ts):
#   - clean() second-boot timeout: fixed (EFI vars wipe removed), confirmed on CI
#   - arm64 REST stale-response: could not reproduce (RouterOS 7.23.1 / Bun 1.3.14);
#     exec tests un-skipped + passing. The repro step below stays as a regression guard.

on:
  workflow_dispatch:
    inputs:
      # ── What to run (modes) ──────────────────────────────────────────────────
      run-integration:
        type: boolean
        description: "Run the integration test suite on the selected platforms"
        default: true
      run-examples:
        type: boolean
        description: "Run the examples smoke harness on the selected platforms (+ PowerShell lint)"
        default: false
      # ── Which platforms ──────────────────────────────────────────────────────
      linux-x86:
        type: boolean
        description: "Platform — linux/x86_64 (ubuntu-latest, KVM if available)"
        default: false
      linux-arm64:
        type: boolean
        description: "Platform — linux/aarch64 (ubuntu-24.04-arm, KVM if available)"
        default: false
      macos-arm64:
        type: boolean
        description: "Platform — macos/arm64 (macos-15, HVF if available)"
        default: false
      macos-x86:
        type: boolean
        description: "Platform — macos/x86_64 (macos-15-intel, TCG — best-effort, non-gating; integration defaults to a smoke subset, set test-filter to run more)"
        default: false
      windows-x86:
        type: boolean
        description: "Platform — windows/x86_64 (windows-latest, TCG — EXPERIMENTAL, informational, non-gating)"
        default: false
      # ── Scope / target ───────────────────────────────────────────────────────
      test-filter:
        type: string
        description: "Integration: comma-separated test file names (e.g. 'exec.test.ts,anchor.test.ts'). Empty = all files."
        default: ""
      example-filter:
        type: string
        description: "Examples: comma-separated example names for the smoke harness (e.g. 'quickstart,rollback'). Empty = the curated subset."
        default: ""
      routeros-target:
        type: string
        description: "RouterOS target: a channel (stable/long-term/testing/development) or a pinned version (e.g. 7.22.1, 7.24beta2). Empty = stable."
        default: ""

# Least-privilege default for all jobs (read-only; jobs only run tests + upload artifacts).
permissions:
  contents: read

jobs:
  # ── linux/x86_64 (ubuntu-latest, KVM) ────────────────────────────────────────
  # On-demand x86 run against an arbitrary routeros-target. The push pipeline
  # (ci.yml) and publish.yml always boot the default (stable); this job is how you
  # exercise x86 against long-term/testing/development or a pinned version.
  integration-linux-x86:
    name: Integration (linux/x86_64)
    if: ${{ inputs.linux-x86 == true && inputs.run-integration == true }}
    runs-on: ubuntu-latest
    env:
      QUICKCHR_TEST_TARGET: ${{ inputs.routeros-target }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      # ipxe-qemu provides efi-virtio.rom — harmless on x86, kept consistent across runners.
      - name: Install QEMU + tools
        run: |
          set -eo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-x86 qemu-utils ipxe-qemu sshpass

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          if [ -w /dev/kvm ] 2>/dev/null; then
            echo "KVM is available — hardware acceleration active"
          else
            echo "::notice::KVM not available — integration tests will use TCG (slower)"
          fi

      - name: Log platform
        run: |
          {
            echo "### Platform: linux/x86_64"
            echo "- OS: $(uname -s) $(uname -m)"
            qemu-system-x86_64 --version 2>/dev/null | head -1 | sed 's/^/- QEMU: /' || true
            echo "- Bun: $(bun --version)"
            echo "- RouterOS target: \`${QUICKCHR_TEST_TARGET:-stable (default)}\`"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Resolve test files
        id: files
        # test-filter is passed via env (not expanded into the script) to avoid
        # workflow template injection — same pattern as routeros-target above.
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          FILTER="$TEST_FILTER"
          if [ -z "$FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            FILES=""
            IFS=',' read -ra PARTS <<< "$FILTER"
            for f in "${PARTS[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                FILES="$FILES test/integration/$f"
              else
                echo "::warning::Skipping unknown test file: $f"
              fi
            done
            # Fail fast if the filter matched nothing — otherwise the run step's
            # loop iterates zero times and the job exits 0 (false green).
            if [ -z "${FILES// /}" ]; then
              echo "::error::test-filter '$FILTER' matched no known files in test/integration/"
              exit 1
            fi
            echo "list=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests (sequential per-file)
        run: |
          set -eo pipefail
          echo "::group::Integration test output"
          : > /tmp/integration-output.txt
          fail=0
          for f in ${{ steps.files.outputs.list }}; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/integration-output.txt; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        timeout-minutes: 50

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — linux/x86_64"
            echo ""
            echo '```'
            tail -80 /tmp/integration-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs-linux-x86
          path: |
            /tmp/integration-output.txt
            ~/.local/share/quickchr/machines/**/*.json
            ~/.local/share/quickchr/machines/**/*.log
          retention-days: 7

  # ── linux/aarch64 (ubuntu-24.04-arm, KVM) ────────────────────────────────────
  integration-linux-arm64:
    name: Integration (linux/aarch64)
    if: ${{ inputs.linux-arm64 == true && inputs.run-integration == true }}
    runs-on: ubuntu-24.04-arm
    env:
      QUICKCHR_TEST_TARGET: ${{ inputs.routeros-target }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      # qemu-efi-aarch64 → UEFI firmware for virt machine
      # ipxe-qemu       → efi-virtio.rom (required by virtio-net-pci)
      - name: Install QEMU + tools
        run: |
          set -eo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-arm qemu-utils qemu-efi-aarch64 ipxe-qemu sshpass

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          if [ -w /dev/kvm ] 2>/dev/null; then
            echo "KVM is available — hardware acceleration active"
          else
            echo "::notice::KVM not available — integration tests will use TCG (slower)"
          fi

      - name: Log platform
        run: |
          {
            echo "### Platform: linux/aarch64"
            echo "- OS: $(uname -s) $(uname -m)"
            echo "- Kernel: $(uname -r)"
            qemu-system-aarch64 --version 2>/dev/null | head -1 | sed 's/^/- QEMU: /' || true
            echo "- Bun: $(bun --version)"
            if [ -w /dev/kvm ] 2>/dev/null; then
              echo "- KVM: available (hardware acceleration active)"
              echo "  - \`$(ls -l /dev/kvm)\`"
            else
              echo "- KVM: **not available** — tests will run under TCG (slow)"
            fi
            echo ""
            echo "#### OVMF firmware (arm64 UEFI)"
            for f in /usr/share/AAVMF/AAVMF_CODE.fd \
                      /usr/share/qemu/QEMU_EFI.fd \
                      /usr/share/qemu-efi-aarch64/QEMU_EFI.fd; do
              if [ -f "$f" ]; then
                echo "- \`$f\` ($(du -h "$f" | cut -f1))"
              fi
            done
            for f in /usr/share/AAVMF/AAVMF_VARS.fd \
                      /usr/share/qemu/QEMU_VARS.fd \
                      /usr/share/qemu-efi-aarch64/QEMU_VARS.fd; do
              if [ -f "$f" ]; then
                echo "- vars template: \`$f\` ($(du -h "$f" | cut -f1))"
              fi
            done
            echo ""
            echo "#### System resources"
            echo "- CPUs: $(nproc)"
            echo "- RAM: $(free -h | awk '/^Mem:/{print $2}')"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Resolve test files
        id: files
        # test-filter is passed via env (not expanded into the script) to avoid
        # workflow template injection — same pattern as routeros-target above.
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          FILTER="$TEST_FILTER"
          if [ -z "$FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            FILES=""
            IFS=',' read -ra PARTS <<< "$FILTER"
            for f in "${PARTS[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                FILES="$FILES test/integration/$f"
              else
                echo "::warning::Skipping unknown test file: $f"
              fi
            done
            # Fail fast if the filter matched nothing — otherwise the run step's
            # loop iterates zero times and the job exits 0 (false green).
            if [ -z "${FILES// /}" ]; then
              echo "::error::test-filter '$FILTER' matched no known files in test/integration/"
              exit 1
            fi
            echo "list=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests (sequential per-file)
        run: |
          set -eo pipefail
          echo "::group::Integration test output"
          : > /tmp/integration-output.txt
          fail=0
          for f in ${{ steps.files.outputs.list }}; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/integration-output.txt; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        timeout-minutes: 50

      - name: Run arm64 REST ordering repro
        if: always()
        # Intentionally non-gating: the repro's assertions are EXPECTED to fail on a
        # buggy arm64 — that failure IS the diagnostic signal, not a reason to red the
        # job. pipefail stops `tee` from masking bun's real exit code, so we can record
        # an explicit PASS/FAIL line in the summary instead of silently swallowing it.
        run: |
          set -o pipefail
          echo "::group::arm64 REST ordering repro (test/lab/arm64-rest-ordering/repro.test.ts)"
          rc=0
          QUICKCHR_INTEGRATION=1 bun test test/lab/arm64-rest-ordering/repro.test.ts \
            2>&1 | tee /tmp/arm64-rest-repro.txt || rc=$?
          echo "::endgroup::"
          echo "repro exit code: $rc" | tee -a /tmp/arm64-rest-repro.txt
          if [ "$rc" -eq 0 ]; then
            echo "::notice::arm64 REST repro PASSED — GET→POST ordering is correct (no stale-response)"
          else
            echo "::warning::arm64 REST repro FAILED (rc=$rc) — see scenario output for which layer is at fault"
          fi
        timeout-minutes: 15

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — linux/aarch64"
            echo ""
            echo "### Main suite"
            echo '```'
            tail -100 /tmp/integration-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo ""
            echo "### arm64 REST ordering repro"
            echo '```'
            cat /tmp/arm64-rest-repro.txt 2>/dev/null || echo "(repro not run)"
            echo '```'
            echo ""
            echo "### QEMU logs (last 60 lines per machine)"
            for log in ~/.local/share/quickchr/machines/*/qemu.log; do
              [ -f "$log" ] || continue
              machine=$(basename "$(dirname "$log")")
              echo "#### $machine"
              echo '```'
              tail -60 "$log"
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs-linux-arm64
          path: |
            /tmp/integration-output.txt
            /tmp/arm64-rest-repro.txt
            test/lab/arm64-rest-ordering/REPORT.md
            ~/.local/share/quickchr/machines/**/*.json
            ~/.local/share/quickchr/machines/**/*.log
          retention-days: 7

  # ── macos/arm64 (macos-15, HVF) ──────────────────────────────────────────────
  integration-macos-arm64:
    name: Integration (macos/arm64)
    if: ${{ inputs.macos-arm64 == true && inputs.run-integration == true }}
    runs-on: macos-15
    env:
      QUICKCHR_TEST_TARGET: ${{ inputs.routeros-target }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - name: Install QEMU + tools
        run: brew install qemu sshpass

      - name: Log platform
        run: |
          echo "### Platform: macos/arm64" >> "$GITHUB_STEP_SUMMARY"
          echo "- OS: $(uname -s) $(uname -m)" >> "$GITHUB_STEP_SUMMARY"
          qemu-system-aarch64 --version 2>/dev/null | head -1 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Resolve test files
        id: files
        # test-filter is passed via env (not expanded into the script) to avoid
        # workflow template injection — same pattern as routeros-target above.
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          FILTER="$TEST_FILTER"
          if [ -z "$FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            FILES=""
            IFS=',' read -ra PARTS <<< "$FILTER"
            for f in "${PARTS[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                FILES="$FILES test/integration/$f"
              else
                echo "::warning::Skipping unknown test file: $f"
              fi
            done
            # Fail fast if the filter matched nothing — otherwise the run step's
            # loop iterates zero times and the job exits 0 (false green).
            if [ -z "${FILES// /}" ]; then
              echo "::error::test-filter '$FILTER' matched no known files in test/integration/"
              exit 1
            fi
            echo "list=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests (sequential per-file)
        run: |
          set -eo pipefail
          echo "::group::Integration test output"
          : > /tmp/integration-output.txt
          fail=0
          for f in ${{ steps.files.outputs.list }}; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/integration-output.txt; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        timeout-minutes: 50

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — macos/arm64"
            echo '```'
            tail -80 /tmp/integration-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs-macos-arm64
          path: |
            /tmp/integration-output.txt
            ~/.local/share/quickchr/machines/**/*.json
            ~/.local/share/quickchr/machines/**/*.log
          retention-days: 7

  # ── macos/x86_64 (macos-15-intel, TCG) ───────────────────────────────────────
  # Intel macOS: macos-13 was retired 2025-12-04; macos-15-intel is GitHub's last
  # x86_64 macOS image (standard/free on public repos, supported to ~Fall 2027).
  # Best-effort / non-gating: hosted macOS runners expose no HVF, so x86 CHR boots
  # under TCG and the *full* suite starves the runner for CPU/memory (observed:
  # "runner lost communication" near the 60-min mark, before any cleanup runs). So
  # this job defaults to a smoke subset (see "Resolve test files") that completes
  # under TCG; an explicit test-filter input overrides it. `continue-on-error` plus
  # the job-level timeout keep any TCG stall from turning the dispatch red.
  integration-macos-x86:
    name: Integration (macos/x86_64)
    if: ${{ inputs.macos-x86 == true && inputs.run-integration == true }}
    runs-on: macos-15-intel
    continue-on-error: true
    timeout-minutes: 75
    env:
      QUICKCHR_TEST_TARGET: ${{ inputs.routeros-target }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - name: Install QEMU + tools
        run: brew install qemu sshpass

      - name: Log platform
        run: |
          echo "### Platform: macos/x86_64" >> "$GITHUB_STEP_SUMMARY"
          echo "- OS: $(uname -s) $(uname -m)" >> "$GITHUB_STEP_SUMMARY"
          qemu-system-x86_64 --version 2>/dev/null | head -1 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Resolve test files
        id: files
        # test-filter is passed via env (not expanded into the script) to avoid
        # workflow template injection — same pattern as routeros-target above.
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          # macos-x86 is TCG-only (no HVF on hosted Intel runners), so the full
          # integration suite starves the runner before it finishes (~64 min →
          # "lost communication"). Default to a curated smoke subset that completes
          # under TCG and still exercises the core boot + REST path. An explicit
          # test-filter input overrides this for a full or targeted run.
          SMOKE="anchor.test.ts"
          FILTER="$TEST_FILTER"
          if [ -z "$FILTER" ]; then
            echo "::notice::macos-x86 smoke default: $SMOKE (override via the test-filter input)"
            FILTER="$SMOKE"
          fi
          FILES=""
          IFS=',' read -ra PARTS <<< "$FILTER"
          for f in "${PARTS[@]}"; do
            f="${f// /}"
            if [ -f "test/integration/$f" ]; then
              FILES="$FILES test/integration/$f"
            else
              echo "::warning::Skipping unknown test file: $f"
            fi
          done
          # Fail fast if the filter matched nothing — otherwise the run step's
          # loop iterates zero times and the job exits 0 (false green).
          if [ -z "${FILES// /}" ]; then
            echo "::error::test-filter '$FILTER' matched no known files in test/integration/"
            exit 1
          fi
          echo "list=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run integration tests (sequential per-file)
        run: |
          set -eo pipefail
          # Kill any orphaned QEMU processes when this step exits (timeout, error, or
          # cancellation). Without this, unref()'d TCG QEMU processes keep consuming
          # 100% CPU after the step is killed, starving the runner until it loses
          # communication with GitHub and the cleanup steps never run.
          _cleanup_qemu() {
            pkill -TERM qemu-system-x86_64 2>/dev/null || true
            sleep 3
            pkill -KILL qemu-system-x86_64 2>/dev/null || true
          }
          trap _cleanup_qemu EXIT INT TERM
          echo "::group::Integration test output"
          : > /tmp/integration-output.txt
          fail=0
          for f in ${{ steps.files.outputs.list }}; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/integration-output.txt; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        # Smoke subset needs far less than the full suite; a tight ceiling kills a
        # hung TCG boot before the runner is badly starved (one QEMU, not many), so
        # the cleanup/upload steps below can actually run.
        timeout-minutes: 30

      - name: Kill QEMU processes
        if: always()
        run: |
          pkill -TERM qemu-system-x86_64 2>/dev/null || true
          sleep 3
          pkill -KILL qemu-system-x86_64 2>/dev/null || true
          true

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — macos/x86_64"
            echo '```'
            tail -80 /tmp/integration-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs-macos-x64
          path: |
            /tmp/integration-output.txt
            ~/.local/share/quickchr/machines/**/*.json
            ~/.local/share/quickchr/machines/**/*.log
          retention-days: 7

  # ── windows/x86_64 (windows-latest, TCG) ─────────────────────────────────────
  # EXPERIMENTAL / informational only — `continue-on-error` so it never gates a
  # publish. The full suite already passed here once (2026-06-07, 56/0/3 on TCG);
  # this job keeps watching the Windows end-to-end path (TCP channels, SLiRP
  # networking, CHR boot under TCG). scp works without `sshpass`; the only known
  # gap is named-socket (`socat` absent on Windows). TCG boots are slow — start
  # narrow with `test-filter` (e.g. `start-stop.test.ts`) before the full suite.
  integration-windows-x86:
    name: Integration (windows/x86_64)
    if: ${{ inputs.windows-x86 == true && inputs.run-integration == true }}
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash
    env:
      QUICKCHR_TEST_TARGET: ${{ inputs.routeros-target }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      # No HVF/WHPX on GitHub Windows runners → QEMU falls back to TCG.
      - name: Install QEMU
        shell: pwsh
        run: |
          choco install qemu -y --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\qemu"

      - name: Log platform
        run: |
          echo "### Platform: windows/x86_64 (TCG)" >> "$GITHUB_STEP_SUMMARY"
          echo "- OS: $(uname -s) $(uname -m)" >> "$GITHUB_STEP_SUMMARY"
          qemu-system-x86_64 --version 2>/dev/null | head -1 >> "$GITHUB_STEP_SUMMARY" || true
          echo "- Note: experimental/informational, sshpass+socat absent on Windows" >> "$GITHUB_STEP_SUMMARY"

      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Resolve test files
        id: files
        # test-filter is passed via env (not expanded into the script) to avoid
        # workflow template injection — same pattern as routeros-target above.
        env:
          TEST_FILTER: ${{ inputs.test-filter }}
        run: |
          FILTER="$TEST_FILTER"
          if [ -z "$FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            FILES=""
            IFS=',' read -ra PARTS <<< "$FILTER"
            for f in "${PARTS[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                FILES="$FILES test/integration/$f"
              else
                echo "::warning::Skipping unknown test file: $f"
              fi
            done
            # Fail fast if the filter matched nothing — otherwise the run step's
            # loop iterates zero times and the job exits 0 (false green).
            if [ -z "${FILES// /}" ]; then
              echo "::error::test-filter '$FILTER' matched no known files in test/integration/"
              exit 1
            fi
            echo "list=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests (sequential per-file)
        run: |
          set -eo pipefail
          echo "::group::Integration test output"
          # Write the log under $HOME (the C: user profile) so it shares a drive
          # with the machine state dir (~/AppData/Local). upload-artifact computes a
          # least-common-ancestor across all paths; a workspace-relative path lives on
          # D:\ and has no common ancestor with C:\…\AppData → the upload errors.
          : > "$HOME/integration-output.txt"
          fail=0
          for f in ${{ steps.files.outputs.list }}; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a "$HOME/integration-output.txt"; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        timeout-minutes: 90

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — windows/x86_64 (TCG, informational)"
            echo '```'
            tail -80 "$HOME/integration-output.txt" 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs-windows-x64
          path: |
            ~/integration-output.txt
            ~/AppData/Local/quickchr/machines/**/*.json
            ~/AppData/Local/quickchr/machines/**/*.log
          retention-days: 7

  # ── plan: examples-smoke matrix ──────────────────────────────────────────────
  # Builds the smoke matrix from the selected platform toggles so one dispatch fans
  # the examples across exactly the chosen OSes (mirroring the integration jobs),
  # without five near-identical job definitions. gating=true → a failure reds the
  # workflow (linux KVM / macOS HVF); gating=false → informational (TCG platforms).
  plan-smoke:
    name: Plan examples-smoke matrix
    if: ${{ inputs.run-examples == true }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      any: ${{ steps.gen.outputs.any }}
    steps:
      - id: gen
        env:
          LINUX_X86: ${{ inputs.linux-x86 }}
          LINUX_ARM64: ${{ inputs.linux-arm64 }}
          MACOS_ARM64: ${{ inputs.macos-arm64 }}
          MACOS_X86: ${{ inputs.macos-x86 }}
          WINDOWS_X86: ${{ inputs.windows-x86 }}
        run: |
          set -eo pipefail
          inc='[]'
          add() {
            inc=$(printf '%s' "$inc" | jq -c \
              --arg label "$1" --arg os "$2" --argjson gating "$3" \
              '. + [{label:$label, os:$os, gating:$gating}]')
          }
          if [ "$LINUX_X86" = "true" ];   then add "linux/x86_64"   "ubuntu-latest"    true;  fi
          if [ "$LINUX_ARM64" = "true" ]; then add "linux/aarch64"  "ubuntu-24.04-arm" true;  fi
          if [ "$MACOS_ARM64" = "true" ]; then add "macos/arm64"    "macos-15"         true;  fi
          if [ "$MACOS_X86" = "true" ];   then add "macos/x86_64"   "macos-15-intel"   false; fi
          if [ "$WINDOWS_X86" = "true" ]; then add "windows/x86_64" "windows-latest"   false; fi
          echo "matrix={\"include\":$inc}" >> "$GITHUB_OUTPUT"
          if [ "$inc" = "[]" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "::warning::run-examples is on but no platform is selected — examples smoke will be skipped."
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved smoke matrix: $inc"

  # ── examples smoke (platform matrix) ─────────────────────────────────────────
  # Runs the runnable examples end-to-end (one representative per language for the
  # current OS + the intentional failure-path case) to catch CLI/env/exit-code/
  # cleanup drift the cheap gate (tsc/biome/shellcheck/validate-examples) can't.
  # A broken example here REDS the workflow on gating platforms. `trial-license` is
  # excluded (MikroTik rate limits). EXAMPLE_FILTER subsets it.
  examples-smoke:
    name: Examples smoke (${{ matrix.label }})
    needs: plan-smoke
    if: ${{ needs.plan-smoke.outputs.any == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan-smoke.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.gating == false }}
    env:
      QUICKCHR_TEST_TARGET: ${{ inputs.routeros-target }}
      EXAMPLE_FILTER: ${{ inputs.example-filter }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - name: Install QEMU + tools (Linux x86)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          set -eo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-x86 qemu-utils ipxe-qemu sshpass

      - name: Install QEMU + tools (Linux arm64)
        if: ${{ matrix.os == 'ubuntu-24.04-arm' }}
        run: |
          set -eo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-arm qemu-utils qemu-efi-aarch64 ipxe-qemu sshpass

      - name: Install QEMU + tools (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: brew install qemu sshpass

      - name: Install QEMU (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          choco install qemu -y --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\qemu"

      # uv runs the Python example representative (mndp.py) the documented way.
      - name: Install uv (Linux/macOS)
        if: ${{ runner.os != 'Windows' }}
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        if: ${{ runner.os == 'Linux' }}
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      # Tilde in `path:` is expanded by actions/cache (same as the integration jobs).
      - name: Cache CHR images (POSIX)
        if: ${{ runner.os != 'Windows' }}
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - name: Cache CHR images (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Log platform
        shell: bash
        run: |
          {
            echo "### Examples smoke: ${{ matrix.label }}"
            echo "- OS: $(uname -s 2>/dev/null || echo Windows) / ${{ runner.arch }}"
            echo "- Bun: $(bun --version)"
            echo "- RouterOS target: \`${QUICKCHR_TEST_TARGET:-stable (default)}\`"
            echo "- Example filter: \`${EXAMPLE_FILTER:-curated subset}\`"
            echo "- Gating: ${{ matrix.gating }}"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # The harness (test/integration/examples-smoke.test.ts) picks the right
      # representatives for the current OS (.ts everywhere; .sh/.py on POSIX; .ps1
      # on Windows). `bun run` evaluates the VAR=val script prefix cross-platform.
      - name: Run examples smoke harness
        shell: bash
        run: |
          set -o pipefail
          bun run smoke:examples 2>&1 | tee smoke-output.txt
        timeout-minutes: 60

      - name: Write smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Examples smoke — ${{ matrix.label }}"
            echo '```'
            tail -60 smoke-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── PowerShell lint (windows-latest) ─────────────────────────────────────────
  # Static-analyze the example .ps1 scripts so PowerShell can't silently bit-rot.
  # Uses examples/PSScriptAnalyzerSettings.psd1 (documents which rules are waived
  # and why). Gating: a flagged .ps1 reds the workflow.
  # Reuses the dedicated PowerShell-lint workflow (also runs on its own for `.ps1`
  # changes — see lint-powershell.yml / issue #28), so the dispatch path stays
  # covered without duplicating the PSScriptAnalyzer invocation here.
  lint-powershell:
    name: Lint PowerShell examples
    if: ${{ inputs.run-examples == true }}
    uses: ./.github/workflows/lint-powershell.yml
