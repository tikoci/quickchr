name: Extended Verification

# Manual workflow for integration testing on platforms not covered by the main
# CI push pipeline (which runs linux/x86_64 integration + Windows unit tests).
#
# Each dispatch input maps 1:1 to a platform job — enable any combination.
# Jobs are independent and run in parallel.
#
# Use test-filter to run only specific integration test files for faster iteration:
#   e.g. "exec.test.ts,anchor.test.ts"  →  only those two files run
#   empty string (default)              →  all test/integration/*.test.ts files run
#
# arm64 known issues (tracked in BACKLOG.md):
#   - clean() second-boot timeout skipped on arm64
#   - arm64 REST stale-response bug causes exec tests to be skipped

on:
  workflow_dispatch:
    inputs:
      linux-arm64:
        type: boolean
        description: "Integration — linux/aarch64 (ubuntu-24.04-arm, KVM if available)"
        default: false
      macos-arm64:
        type: boolean
        description: "Integration — macos/arm64 (macos-15, HVF if available)"
        default: false
      macos-x86:
        type: boolean
        description: "Integration — macos/x86_64 (macos-15-intel, TCG — best-effort, no HVF on hosted runners, may time out; non-gating)"
        default: false
      windows-x86:
        type: boolean
        description: "Integration — windows/x86_64 (windows-latest, TCG — EXPERIMENTAL, informational, non-gating)"
        default: false
      test-filter:
        type: string
        description: "Comma-separated test file names (e.g. 'exec.test.ts,anchor.test.ts'). Empty = all files."
        default: ""

# Least-privilege default for all jobs (read-only; jobs only run tests + upload artifacts).
permissions:
  contents: read

jobs:
  # ── linux/aarch64 (ubuntu-24.04-arm, KVM) ────────────────────────────────────
  integration-linux-arm64:
    name: Integration (linux/aarch64)
    if: ${{ inputs.linux-arm64 == true }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      # qemu-efi-aarch64 → UEFI firmware for virt machine
      # ipxe-qemu       → efi-virtio.rom (required by virtio-net-pci)
      - name: Install QEMU + tools
        run: |
          set -eo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            qemu-system-arm qemu-utils qemu-efi-aarch64 ipxe-qemu sshpass

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
          if [ -w /dev/kvm ] 2>/dev/null; then
            echo "KVM is available — hardware acceleration active"
          else
            echo "::notice::KVM not available — integration tests will use TCG (slower)"
          fi

      - name: Log platform
        run: |
          echo "### Platform: linux/aarch64" >> "$GITHUB_STEP_SUMMARY"
          echo "- OS: $(uname -s) $(uname -m)" >> "$GITHUB_STEP_SUMMARY"
          qemu-system-aarch64 --version 2>/dev/null | head -1 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Resolve test files
        id: files
        run: |
          FILTER="${{ inputs.test-filter }}"
          if [ -z "$FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            FILES=""
            IFS=',' read -ra PARTS <<< "$FILTER"
            for f in "${PARTS[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                FILES="$FILES test/integration/$f"
              else
                echo "::warning::Skipping unknown test file: $f"
              fi
            done
            echo "list=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests (sequential per-file)
        run: |
          set -eo pipefail
          echo "::group::Integration test output"
          : > /tmp/integration-output.txt
          fail=0
          for f in ${{ steps.files.outputs.list }}; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/integration-output.txt; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        timeout-minutes: 50

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — linux/aarch64"
            echo '```'
            tail -80 /tmp/integration-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs-linux-arm64
          path: |
            /tmp/integration-output.txt
            ~/.local/share/quickchr/machines/**/*.json
            ~/.local/share/quickchr/machines/**/*.log
          retention-days: 7

  # ── macos/arm64 (macos-15, HVF) ──────────────────────────────────────────────
  integration-macos-arm64:
    name: Integration (macos/arm64)
    if: ${{ inputs.macos-arm64 == true }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - name: Install QEMU + tools
        run: brew install qemu sshpass

      - name: Log platform
        run: |
          echo "### Platform: macos/arm64" >> "$GITHUB_STEP_SUMMARY"
          echo "- OS: $(uname -s) $(uname -m)" >> "$GITHUB_STEP_SUMMARY"
          qemu-system-aarch64 --version 2>/dev/null | head -1 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Resolve test files
        id: files
        run: |
          FILTER="${{ inputs.test-filter }}"
          if [ -z "$FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            FILES=""
            IFS=',' read -ra PARTS <<< "$FILTER"
            for f in "${PARTS[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                FILES="$FILES test/integration/$f"
              else
                echo "::warning::Skipping unknown test file: $f"
              fi
            done
            echo "list=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests (sequential per-file)
        run: |
          set -eo pipefail
          echo "::group::Integration test output"
          : > /tmp/integration-output.txt
          fail=0
          for f in ${{ steps.files.outputs.list }}; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/integration-output.txt; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        timeout-minutes: 50

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — macos/arm64"
            echo '```'
            tail -80 /tmp/integration-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs-macos-arm64
          path: |
            /tmp/integration-output.txt
            ~/.local/share/quickchr/machines/**/*.json
            ~/.local/share/quickchr/machines/**/*.log
          retention-days: 7

  # ── macos/x86_64 (macos-15-intel, TCG) ───────────────────────────────────────
  # Intel macOS: macos-13 was retired 2025-12-04; macos-15-intel is GitHub's last
  # x86_64 macOS image (standard/free on public repos, supported to ~Fall 2027).
  # Best-effort / non-gating: hosted macOS runners expose no HVF, so x86 CHR boots
  # under TCG and the full suite can starve the runner for CPU/memory (observed:
  # "runner lost communication" near the 60-min mark). `continue-on-error` keeps a
  # TCG timeout from turning the dispatch red; the job-level timeout is a clean backstop.
  integration-macos-x86:
    name: Integration (macos/x86_64)
    if: ${{ inputs.macos-x86 == true }}
    runs-on: macos-15-intel
    continue-on-error: true
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - name: Install QEMU + tools
        run: brew install qemu sshpass

      - name: Log platform
        run: |
          echo "### Platform: macos/x86_64" >> "$GITHUB_STEP_SUMMARY"
          echo "- OS: $(uname -s) $(uname -m)" >> "$GITHUB_STEP_SUMMARY"
          qemu-system-x86_64 --version 2>/dev/null | head -1 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Resolve test files
        id: files
        run: |
          FILTER="${{ inputs.test-filter }}"
          if [ -z "$FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            FILES=""
            IFS=',' read -ra PARTS <<< "$FILTER"
            for f in "${PARTS[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                FILES="$FILES test/integration/$f"
              else
                echo "::warning::Skipping unknown test file: $f"
              fi
            done
            echo "list=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests (sequential per-file)
        run: |
          set -eo pipefail
          # Kill any orphaned QEMU processes when this step exits (timeout, error, or
          # cancellation). Without this, unref()'d TCG QEMU processes keep consuming
          # 100% CPU after the step is killed, starving the runner until it loses
          # communication with GitHub and the cleanup steps never run.
          _cleanup_qemu() {
            pkill -TERM qemu-system-x86_64 2>/dev/null || true
            sleep 3
            pkill -KILL qemu-system-x86_64 2>/dev/null || true
          }
          trap _cleanup_qemu EXIT INT TERM
          echo "::group::Integration test output"
          : > /tmp/integration-output.txt
          fail=0
          for f in ${{ steps.files.outputs.list }}; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a /tmp/integration-output.txt; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        timeout-minutes: 50

      - name: Kill QEMU processes
        if: always()
        run: |
          pkill -TERM qemu-system-x86_64 2>/dev/null || true
          sleep 3
          pkill -KILL qemu-system-x86_64 2>/dev/null || true
          true

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — macos/x86_64"
            echo '```'
            tail -80 /tmp/integration-output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs-macos-x64
          path: |
            /tmp/integration-output.txt
            ~/.local/share/quickchr/machines/**/*.json
            ~/.local/share/quickchr/machines/**/*.log
          retention-days: 7

  # ── windows/x86_64 (windows-latest, TCG) ─────────────────────────────────────
  # EXPERIMENTAL / informational only — `continue-on-error` so it never gates a
  # publish. Purpose: get real data on the Windows end-to-end path (TCP channels,
  # SLiRP networking, CHR boot under TCG) to unblock the local-first plan in
  # BACKLOG.md. Known expected failures: no `sshpass`/`socat` on Windows (scp +
  # named-socket paths), and TCG boots are slow — start narrow with `test-filter`
  # (e.g. `start-stop.test.ts`) before running the full suite.
  integration-windows-x86:
    name: Integration (windows/x86_64)
    if: ${{ inputs.windows-x86 == true }}
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      # No HVF/WHPX on GitHub Windows runners → QEMU falls back to TCG.
      - name: Install QEMU
        shell: pwsh
        run: |
          choco install qemu -y --no-progress
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\qemu"

      - name: Log platform
        run: |
          echo "### Platform: windows/x86_64 (TCG)" >> "$GITHUB_STEP_SUMMARY"
          echo "- OS: $(uname -s) $(uname -m)" >> "$GITHUB_STEP_SUMMARY"
          qemu-system-x86_64 --version 2>/dev/null | head -1 >> "$GITHUB_STEP_SUMMARY" || true
          echo "- Note: experimental/informational, sshpass+socat absent on Windows" >> "$GITHUB_STEP_SUMMARY"

      - name: Cache CHR images
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/quickchr/cache
          key: chr-images-${{ runner.os }}-${{ runner.arch }}-v1
          restore-keys: chr-images-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Resolve test files
        id: files
        run: |
          FILTER="${{ inputs.test-filter }}"
          if [ -z "$FILTER" ]; then
            echo "list=$(ls test/integration/*.test.ts | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          else
            FILES=""
            IFS=',' read -ra PARTS <<< "$FILTER"
            for f in "${PARTS[@]}"; do
              f="${f// /}"
              if [ -f "test/integration/$f" ]; then
                FILES="$FILES test/integration/$f"
              else
                echo "::warning::Skipping unknown test file: $f"
              fi
            done
            echo "list=$FILES" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests (sequential per-file)
        run: |
          set -eo pipefail
          echo "::group::Integration test output"
          # Write the log under $HOME (the C: user profile) so it shares a drive
          # with the machine state dir (~/AppData/Local). upload-artifact computes a
          # least-common-ancestor across all paths; a workspace-relative path lives on
          # D:\ and has no common ancestor with C:\…\AppData → the upload errors.
          : > "$HOME/integration-output.txt"
          fail=0
          for f in ${{ steps.files.outputs.list }}; do
            echo "::notice::Running $f"
            if ! QUICKCHR_INTEGRATION=1 bun test "$f" 2>&1 | tee -a "$HOME/integration-output.txt"; then
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "$fail"
        timeout-minutes: 90

      - name: Write integration summary
        if: always()
        run: |
          {
            echo "## Integration Tests — windows/x86_64 (TCG, informational)"
            echo '```'
            tail -80 "$HOME/integration-output.txt" 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: integration-logs-windows-x64
          path: |
            ~/integration-output.txt
            ~/AppData/Local/quickchr/machines/**/*.json
            ~/AppData/Local/quickchr/machines/**/*.log
          retention-days: 7
